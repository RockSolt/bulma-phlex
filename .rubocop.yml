# yaml-language-server: $schema=https://www.rubyschema.org/rubocop.json

require:
  - ./lib/rubocop-bulma_phlex

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable

Gemspec/DevelopmentDependencies:
  Enabled: false

Lint/MissingSuper:
  Exclude:
    - lib/bulma_phlex/**/*.rb
Lint/UselessMethodDefinition:
  Exclude:
    - lib/bulma_phlex/**/*.rb

Metrics/AbcSize:
  Exclude:
    - lib/bulma_phlex/pagination.rb
    - lib/bulma_phlex/tabs.rb
Metrics/BlockLength:
  Exclude:
    - lib/bulma_phlex/pagination.rb
    - lib/bulma_phlex/tabs.rb
Metrics/ClassLength:
  Exclude:
    - test/**/*.rb
Metrics/CyclomaticComplexity:
  Exclude:
    - lib/bulma_phlex/pagination.rb
Metrics/MethodLength:
  Enabled: false
Metrics/ParameterLists:
  CountKeywordArgs: false
Metrics/PerceivedComplexity:
  Exclude:
    - lib/bulma_phlex/pagination.rb

Naming/FileName:
  Exclude:
    - lib/bulma-phlex.rb

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

BulmaPhlex/PhlexNewMethod:
  Enabled: true
  Include:
    - lib/bulma_phlex/**/*.rb
  # The cop checks direct superclass only, not the full ancestry chain, so
  # BulmaPhlex::Base must be listed explicitly even though it descends from Phlex::HTML.
  Ancestors:
    - Phlex::HTML
    - BulmaPhlex::Base
